<!DOCTYPE html>
<html>
<head>
    <title>Staff Dashboard</title>
</head>
<body>

<h2>Question Entry Dashboard</h2>

<p>Welcome {{ request.user.username }}</p>

<table border="1" cellpadding="5">
<tr>
<th>ID</th>
<th>Question</th>
<th>Topic</th>
</tr>

{% for q in questions %}
<tr>
<td>{{ q.id }}</td>
<td>{{ q.question_text|truncatechars:80 }}</td>
<td>{{ q.topic }}</td>
</tr>
{% empty %}
<tr>
<td colspan="3">No questions found</td>
</tr>
{% endfor %}

</table>

</body>
</html>
