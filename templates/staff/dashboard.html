
<!DOCTYPE html>
<html>
<head>
<title>Question Entry Dashboard</title>

<style>

body{
    font-family: Arial;
    margin:0;
    background:#f4f6f9;
}

.header{
    background:#343a40;
    color:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
}

.container{
    padding:30px;
}

.add-btn{
    background:#28a745;
    color:white;
    padding:10px 16px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:14px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:white;
}

th{
    background:#007bff;
    color:white;
    padding:10px;
    text-align:left;
}

td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f1f1f1;
}

.actions a{
    text-decoration:none;
    padding:6px 10px;
    border-radius:4px;
    font-size:13px;
    margin-right:5px;
}

.edit-btn{
    background:#ffc107;
    color:black;
}

.delete-btn{
    background:#dc3545;
    color:white;
}

.view-btn{
    background:#17a2b8;
    color:white;
}

</style>
</head>

<body>

<div class="header">
<h2>Question Entry Dashboard</h2>
<div>Welcome {{ request.user.username }}</div>
</div>

<div class="container">

<a href="/admin/students/question/add/">
<button class="add-btn">+ Add Question</button>
</a>

<table>

<tr>
<th>ID</th>
<th>Question</th>
<th>Topic</th>
<th>Actions</th>
</tr>

{% for q in questions %}

<tr>
<td>{{ q.id }}</td>

<td>{{ q.question_text|truncatechars:80 }}</td>

<td>{{ q.topic }}</td>

<td class="actions">

<a class="view-btn" href="/admin/students/question/{{ q.id }}/change/">View</a>

<a class="edit-btn" href="/admin/students/question/{{ q.id }}/change/">Edit</a>

<a class="delete-btn" href="/admin/students/question/{{ q.id }}/delete/">Delete</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
